<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>员工三段打卡考勤系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Microsoft YaHei";}
body{background:#f4f5f7;padding-bottom:40px;}
/* 登录页 */
.login-wrap{padding:60px 20px;}
.login-card{background:#fff;border-radius:16px;padding:30px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.08);max-width:420px;margin:0 auto;}
.login-card h2{text-align:center;color:#2d8cf0;margin-bottom:30px;font-size:22px;}
.input-box{margin-bottom:18px;}
.input-box input{width:100%;padding:14px 16px;border:1px solid #e5e7eb;border-radius:12px;font-size:16px;outline:none;}
.btn{width:100%;padding:15px;background:#2d8cf0;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:500;cursor:pointer;}
/* 顶部头部 */
.header{background:#2d8cf0;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.header h1{font-size:18px;}
.header-buttons{display:flex;gap:10px;align-items:center;}
.logout-btn{background:#fff;color:#2d8cf0;border:none;padding:6px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
/* 管理员入口：仅电脑可见，手机隐藏 */
.admin-enter-btn{background:#ff7d00;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
@media (max-width:768px){
  .admin-enter-btn{display:none !important;}
}
/* 标签栏 */
.tab-bar{display:flex;background:#fff;margin:15px 15px;border-radius:12px;overflow:hidden;}
.tab{flex:1;text-align:center;padding:14px 0;font-size:15px;color:#666;cursor:pointer;}
.tab.active{background:#2d8cf0;color:#fff;}
/* 页面容器 */
.page{margin:0 15px;background:#fff;border-radius:16px;padding:25px;display:none;}
.page.show{display:block;}
/* 打卡页 */
.clock-box{text-align:center;}
.time-text{font-size:42px;color:#2d8cf0;margin:20px 0;font-weight:500;}
.location-tip{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6;}
.clock-submit{padding:18px 50px;background:#19be6b;color:#fff;border:none;border-radius:99px;font-size:18px;margin-top:10px;cursor:pointer;}
.tip-text{margin-top:16px;font-size:15px;line-height:1.7;}
/* 表格通用 */
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th,td{border:1px solid #eee;padding:10px 4px;text-align:center;}
th{background:#f7f8fa;}
.edit-input{width:80px;padding:4px;border:1px solid #ccc;border-radius:4px;}
.btn-save{background:#19be6b;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;}
.btn-del{background:#f56c6c;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;}
/* 弹窗样式 */
.modal-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal-box{background:#fff;width:90%;max-width:380px;padding:30px;border-radius:14px;}
.modal-box h3{text-align:center;margin-bottom:20px;color:#222;}
.modal-input{width:100%;padding:12px 14px;margin-bottom:16px;border:1px solid #ddd;border-radius:8px;font-size:16px;}
.modal-btn-group{display:flex;gap:10px;}
.modal-confirm{flex:1;padding:12px;background:#2d8cf0;color:#fff;border:none;border-radius:8px;cursor:pointer;}
.modal-close{flex:1;padding:12px;background:#999;color:#fff;border:none;border-radius:8px;cursor:pointer;}
/* 工具类 */
.hide{display:none !important;}
.late{color:#f56c6c;font-weight:bold;}
.normal{color:#19be6b;}
</style>
</head>
<body>

<!-- 员工登录页面 -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <h2>三段打卡考勤系统</h2>
    <div class="input-box">
      <input type="text" id="username" placeholder="账号：emp1 / emp2 / emp3 / emp4 / emp5 / emp6 / admin">
    </div>
    <div class="input-box">
      <input type="password" id="password" placeholder="密码统一：123456">
    </div>
    <button class="btn" onclick="userLogin()">登录打卡</button>
  </div>
</div>

<!-- 主页面（员工打卡） -->
<div id="mainPage" class="hide">
  <div class="header">
    <h1>手机考勤打卡</h1>
    <div class="header-buttons">
      <!-- 电脑端才显示管理员入口，手机自动隐藏 -->
      <button class="admin-enter-btn" onclick="openAdminModal()">管理员后台</button>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('clock')">打卡</div>
    <div class="tab" onclick="switchTab('record')">我的记录</div>
  </div>

  <!-- 打卡页面 -->
  <div id="clockPage" class="page show">
    <div class="clock-box">
      <div id="nowTime" class="time-text">00:00:00</div>
      <div class="location-tip" id="locTip">正在获取定位...</div>
      <div class="tip-text">
        打卡规则：<br>
        1.早班：11:00前正常，11点后迟到<br>
        2.中班：16:00前正常，16点后迟到<br>
        3.晚班：18:00前正常，18点后迟到<br>
        4.下班：21:00前完成签退
      </div>
      <button class="clock-submit" id="clockBtn">立即打卡</button>
      <div class="tip-text" id="clockTip"></div>
    </div>
  </div>

  <!-- 个人记录页面 -->
  <div id="recordPage" class="page">
    <h3>我的打卡记录（管理员修改实时同步）</h3>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>早打卡</th>
          <th>中打卡</th>
          <th>晚打卡</th>
          <th>下班</th>
          <th>审核状态</th>
        </tr>
      </thead>
      <tbody id="recordList"></tbody>
    </table>
  </div>
</div>

<!-- 管理员登录弹窗 -->
<div id="adminModal" class="modal-mask hide">
  <div class="modal-box">
    <h3>管理员验证登录</h3>
    <input class="modal-input" id="adminUser" placeholder="管理员账号 admin">
    <input class="modal-input" type="password" id="adminPwd" placeholder="密码 123456">
    <div class="modal-btn-group">
      <button class="modal-confirm" onclick="adminLogin()">进入后台</button>
      <button class="modal-close" onclick="closeAdminModal()">取消</button>
    </div>
  </div>
</div>

<!-- 管理员后台页面（同页面切换，不跳转新网址） -->
<div id="adminPage" class="hide" style="padding:15px;">
  <div class="header">
    <h1>全员考勤管理后台</h1>
    <button class="logout-btn" onclick="backStaffPage()">返回员工打卡主页</button>
  </div>
  <p style="margin:12px 0;color:#666;">修改后自动保存，所有员工页面实时同步更新</p>
  <table>
    <thead>
      <tr>
        <th>员工账号</th>
        <th>日期</th>
        <th>早打卡时间</th>
        <th>中打卡时间</th>
        <th>晚打卡时间</th>
        <th>下班时间</th>
        <th>审核状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="allRecordBox"></tbody>
  </table>
</div>

<script>
// ====================== 配置区 ======================
const COMPANY_LAT = 18.691944;
const COMPANY_LNG = 98.939444;
const ALLOW_RANGE = 100;
// 账号列表
const userList = {
  emp1:{pwd:"123456",role:"user"},
  emp2:{pwd:"123456",role:"user"},
  emp3:{pwd:"123456",role:"user"},
  emp4:{pwd:"123456",role:"user"},
  emp5:{pwd:"123456",role:"user"},
  emp6:{pwd:"123456",role:"user"},
  admin:{pwd:"123456",role:"admin"}
};
let currentUser = null;
let clockRecord = JSON.parse(localStorage.getItem("clockData")) || [];
let currentLocation = null;

// 实时时钟
function updateTime(){
  const d = new Date();
  const h = String(d.getHours()).padStart(2,"0");
  const m = String(d.getMinutes()).padStart(2,"0");
  const s = String(d.getSeconds()).padStart(2,"0");
  document.getElementById("nowTime").innerText = `${h}:${m}:${s}`;
}
setInterval(updateTime,1000);
updateTime();

// 获取GPS定位
function getLocation(){
  const locTip = document.getElementById("locTip");
  if(!navigator.geolocation){
    locTip.innerText = "设备不支持定位";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      currentLocation = {lat: pos.coords.latitude,lng: pos.coords.longitude};
      let dis = getDistance(COMPANY_LAT, COMPANY_LNG, currentLocation.lat, currentLocation.lng);
      if(dis <= ALLOW_RANGE){
        locTip.innerText = `定位正常，距公司${Math.round(dis)}米，可打卡`;
      }else{
        locTip.innerText = `超出打卡范围${Math.round(dis)}米，禁止打卡`;
      }
    },
    function(err){
      if(err.code === 1) locTip.innerText = "定位权限已关闭，请开启";
      else locTip.innerText = "定位获取失败";
      currentLocation = null;
    },
    {enableHighAccuracy:true,timeout:8000}
  );
}

// 经纬度距离计算（米）
function getDistance(lat1,lng1,lat2,lng2){
  const rad = Math.PI / 180;
  const a = Math.sin((lat2-lat1)*rad/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin((lng2-lng1)*rad/2)**2;
  return 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a)) * 6371 * 1000;
}

// 判断迟到标记
function isLate(hourStr, limitHour){
  if(!hourStr) return "";
  let h = parseInt(hourStr.split(":")[0]);
  return h >= limitHour ? "<span class='late'>迟到</span>" : "<span class='normal'>正常</span>";
}

// 切换员工端标签
function switchTab(pageId){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  event.target.classList.add("active");
  document.getElementById(pageId+"Page").classList.add("show");
}

// 员工账号登录
function userLogin(){
  const un = document.getElementById("username").value.trim();
  const pw = document.getElementById("password").value.trim();
  if(userList[un] && userList[un].pwd === pw){
    currentUser = un;
    localStorage.setItem("loginUser",un);
    document.getElementById("loginPage").classList.add("hide");
    document.getElementById("mainPage").classList.remove("hide");
    getLocation();
    renderRecord();
  }else{
    alert("账号或密码错误\n可用账号：emp1~emp6、admin，密码123456");
  }
}

// 退出登录，回到登录页
function logout(){
  currentUser = null;
  localStorage.removeItem("loginUser");
  document.getElementById("loginPage").classList.remove("hide");
  document.getElementById("mainPage").classList.add("hide");
  document.getElementById("adminPage").classList.add("hide");
}

// 打开管理员登录弹窗
function openAdminModal(){
  document.getElementById("adminModal").classList.remove("hide");
  document.getElementById("adminUser").value = "";
  document.getElementById("adminPwd").value = "";
}
// 关闭管理员弹窗
function closeAdminModal(){
  document.getElementById("adminModal").classList.add("hide");
}

// 管理员身份校验登录，切换管理后台
function adminLogin(){
  const u = document.getElementById("adminUser").value.trim();
  const p = document.getElementById("adminPwd").value.trim();
  if(u === "admin" && p === "123456"){
    closeAdminModal();
    document.getElementById("mainPage").classList.add("hide");
    document.getElementById("adminPage").classList.remove("hide");
    renderAllRecord();
  }else{
    alert("管理员账号密码错误");
  }
}

// 从管理后台返回员工打卡主页
function backStaffPage(){
  document.getElementById("adminPage").classList.add("hide");
  document.getElementById("mainPage").classList.remove("hide");
  renderRecord();
}

// 打卡核心逻辑
document.getElementById("clockBtn").onclick = function(){
  const tip = document.getElementById("clockTip");
  if(!currentLocation){
    tip.innerText = "未获取定位，无法打卡";
    return;
  }
  let dis = getDistance(COMPANY_LAT,COMPANY_LNG,currentLocation.lat,currentLocation.lng);
  if(dis > ALLOW_RANGE){
    tip.innerText = "不在打卡范围内，禁止打卡";
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString();
  const timeStr = now.toLocaleTimeString();
  const hour = now.getHours();

  let dayData = clockRecord.find(item=>item.user===currentUser && item.date===dateStr);
  if(!dayData){
    dayData = {
      user:currentUser,
      date:dateStr,
      t1:"",
      t2:"",
      t3:"",
      off:"",
      audit:"待审核"
    };
    clockRecord.push(dayData);
  }

  if(!dayData.t1){
    dayData.t1 = timeStr;
    tip.innerText = `第一段打卡成功 ${timeStr} ${isLate(timeStr,11)}`;
  }else if(!dayData.t2){
    dayData.t2 = timeStr;
    tip.innerText = `第二段打卡成功 ${timeStr} ${isLate(timeStr,16)}`;
  }else if(!dayData.t3){
    dayData.t3 = timeStr;
    tip.innerText = `第三段打卡成功 ${timeStr} ${isLate(timeStr,18)}`;
  }else if(!dayData.off){
    if(hour>21){
      tip.innerText = "已超过21点，下班打卡超时";
    }else{
      dayData.off = timeStr;
      tip.innerText = `下班签退完成 ${timeStr}`;
    }
  }else{
    tip.innerText = "今日四段打卡全部完成";
  }

  saveClockData();
  renderRecord();
}

// 保存数据到本地存储
function saveClockData(){
  localStorage.setItem("clockData",JSON.stringify(clockRecord));
}

// 渲染当前员工个人记录
function renderRecord(){
  const box = document.getElementById("recordList");
  box.innerHTML = "";
  const myData = clockRecord.filter(i=>i.user===currentUser);
  myData.forEach(item=>{
    box.innerHTML += `<tr>
      <td>${item.date}</td>
      <td>${item.t1||"-"} ${isLate(item.t1,11)}</td>
      <td>${item.t2||"-"} ${isLate(item.t2,16)}</td>
      <td>${item.t3||"-"} ${isLate(item.t3,18)}</td>
      <td>${item.off||"-"}</td>
      <td>${item.audit}</td>
    </tr>`;
  })
}

// 渲染管理员全部员工记录
function renderAllRecord(){
  clockRecord = JSON.parse(localStorage.getItem("clockData")) || [];
  const box = document.getElementById("allRecordBox");
  box.innerHTML = "";
  if(clockRecord.length === 0){
    box.innerHTML = "<tr><td colspan='8'>暂无任何打卡记录</td></tr>";
    return;
  }
  clockRecord.forEach((item,idx)=>{
    box.innerHTML += `
    <tr>
      <td>${item.user}</td>
      <td>${item.date}</td>
      <td><input class="edit-input" value="${item.t1}" id="t1_${idx}"> ${isLate(item.t1,11)}</td>
      <td><input class="edit-input" value="${item.t2}" id="t2_${idx}"> ${isLate(item.t2,16)}</td>
      <td><input class="edit-input" value="${item.t3}" id="t3_${idx}"> ${isLate(item.t3,18)}</td>
      <td><input class="edit-input" value="${item.off}" id="off_${idx}"></td>
      <td>
        <select id="audit_${idx}">
          <option value="待审核" ${item.audit==="待审核"?"selected":""}>待审核</option>
          <option value="已通过" ${item.audit==="已通过"?"selected":""}>已通过</option>
          <option value="已驳回" ${item.audit==="已驳回"?"selected":""}>已驳回</option>
        </select>
      </td>
      <td>
        <button class="btn-save" onclick="editRecord(${idx})">保存修改</button>
        <button class="btn-del" onclick="delRecord(${idx})">删除</button>
      </td>
    </tr>
    `;
  })
}

// 管理员保存修改单条记录
function editRecord(index){
  const row = clockRecord[index];
  row.t1 = document.getElementById(`t1_${index}`).value.trim();
  row.t2 = document.getElementById(`t2_${index}`).value.trim();
  row.t3 = document.getElementById(`t3_${index}`).value.trim();
  row.off = document.getElementById(`off_${index}`).value.trim();
  row.audit = document.getElementById(`audit_${index}`).value;
  saveClockData();
  renderAllRecord();
  alert("修改已保存，员工页面实时同步");
}

// 管理员删除单条打卡记录
function delRecord(index){
  if(confirm("确认删除该员工当日全部打卡记录？")){
    clockRecord.splice(index,1);
    saveClockData();
    renderAllRecord();
  }
}

// 监听存储变化，其他页面修改自动刷新
window.addEventListener("storage", function(){
  clockRecord = JSON.parse(localStorage.getItem("clockData")) || [];
  if(!document.getElementById("mainPage").classList.contains("hide")){
    renderRecord();
  }
  if(!document.getElementById("adminPage").classList.contains("hide")){
    renderAllRecord();
  }
})

// 页面加载自动免登录
window.onload = function(){
  const cacheUser = localStorage.getItem("loginUser");
  if(cacheUser && userList[cacheUser]){
    currentUser = cacheUser;
    document.getElementById("loginPage").classList.add("hide");
    document.getElementById("mainPage").classList.remove("hide");
    getLocation();
    renderRecord();
  }
}
</script>
</body>
</html>
